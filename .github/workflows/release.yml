name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        type: string
      createTag:
        description: 'Create Git tag after release'
        required: true
        type: boolean
        default: true

jobs:
  release:
    name: Release to Maven Central
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Configure Git user
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Set version output
        id: version
        run: echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Update version in pom.xml
        run: ./mvnw versions:set -DnewVersion=${{ inputs.version }} -B

      - name: Build and verify release
        run: ./mvnw clean verify -B -DskipTests

      - name: Publish to Maven Central
        run: ./mvnw clean deploy -B -P release -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Commit and tag release
        if: inputs.createTag
        run: |
          git add pom.xml
          git commit -m "chore: release version ${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        if: inputs.createTag
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update to next SNAPSHOT version
        if: inputs.createTag
        run: |
          # Calculate next patch version
          CURRENT_VERSION=${{ inputs.version }}
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-SNAPSHOT"

          ./mvnw versions:set -DnewVersion=${NEXT_VERSION} -B
          git add pom.xml
          git commit -m "chore: bump to next development version ${NEXT_VERSION}"
          git push origin main

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Release failed. Please check the workflow logs."
          echo "::error::Manual intervention may be required to clean up partial releases."

  rollback:
    name: Rollback (Manual)
    runs-on: ubuntu-latest
    if: always() && failure()
    needs: release

    steps:
      - name: Check failure status
        run: |
          echo "Release failed. Manual rollback may be required."
          echo "Check Maven Central for any partially published artifacts."
          echo "Contact Maven Central support to remove artifacts if necessary."
